name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Create production environment
        run: |
          cat <<'EOF' > src/environments/environment.prod.ts
          import { LoveUser } from '../app/models/user.interface';
          import { AppEnvironment } from './environment.model';

          const appUsers: LoveUser[] = [
            {
              id: 'user_you',
              name: '${{ secrets.MYLOVE_USER_NAME }}',
              avatar: '${{ secrets.MYLOVE_USER_AVATAR }}',
              partnerId: 'user_partner'
            },
            {
              id: 'user_partner',
              name: '${{ secrets.MYLOVE_PARTNER_NAME }}',
              avatar: '${{ secrets.MYLOVE_PARTNER_AVATAR }}',
              partnerId: 'user_you'
            }
          ];

          export const environment: AppEnvironment = {
            production: true,
            sharedAccessCode: '${{ secrets.MYLOVE_SHARED_ACCESS_CODE }}',
            firebase: {
              apiKey: '${{ secrets.FIREBASE_API_KEY }}',
              authDomain: '${{ secrets.FIREBASE_AUTH_DOMAIN }}',
              projectId: '${{ secrets.FIREBASE_PROJECT_ID }}',
              storageBucket: '${{ secrets.FIREBASE_STORAGE_BUCKET }}',
              messagingSenderId: '${{ secrets.FIREBASE_MESSAGING_SENDER_ID }}',
              appId: '${{ secrets.FIREBASE_APP_ID }}'
            },
            appUsers
          };
          EOF

      - name: Build app
        run: npm run build -- --base-href "/${{ github.event.repository.name }}/"

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/my-love/browser

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
