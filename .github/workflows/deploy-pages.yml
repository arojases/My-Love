name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FIREBASE_API_KEY: ${{ secrets.FIREBASE_API_KEY }}
      FIREBASE_AUTH_DOMAIN: ${{ secrets.FIREBASE_AUTH_DOMAIN }}
      FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
      FIREBASE_STORAGE_BUCKET: ${{ secrets.FIREBASE_STORAGE_BUCKET }}
      FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.FIREBASE_MESSAGING_SENDER_ID }}
      FIREBASE_APP_ID: ${{ secrets.FIREBASE_APP_ID }}
      MYLOVE_SHARED_ACCESS_CODE: ${{ secrets.MYLOVE_SHARED_ACCESS_CODE }}
      MYLOVE_USER_NAME: ${{ secrets.MYLOVE_USER_NAME }}
      MYLOVE_USER_AVATAR: ${{ secrets.MYLOVE_USER_AVATAR }}
      MYLOVE_PARTNER_NAME: ${{ secrets.MYLOVE_PARTNER_NAME }}
      MYLOVE_PARTNER_AVATAR: ${{ secrets.MYLOVE_PARTNER_AVATAR }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Validate required secrets
        run: |
          required_vars=(
            FIREBASE_API_KEY
            FIREBASE_AUTH_DOMAIN
            FIREBASE_PROJECT_ID
            FIREBASE_STORAGE_BUCKET
            FIREBASE_MESSAGING_SENDER_ID
            FIREBASE_APP_ID
            MYLOVE_SHARED_ACCESS_CODE
            MYLOVE_USER_NAME
            MYLOVE_USER_AVATAR
            MYLOVE_PARTNER_NAME
            MYLOVE_PARTNER_AVATAR
          )

          for var_name in "${required_vars[@]}"; do
            if [ -z "${!var_name}" ]; then
              echo "Missing required secret: ${var_name}"
              exit 1
            fi
          done

          case "$FIREBASE_API_KEY" in
            YOUR_API_KEY|AIza*)
              ;;
            *)
              echo "FIREBASE_API_KEY does not look valid."
              exit 1
              ;;
          esac

      - name: Install dependencies
        run: npm ci

      - name: Create production environment
        run: |
          cat > scripts-write-env.mjs <<'EOF'
          import { writeFileSync } from 'node:fs';

          const envFile = `import { LoveUser } from '../app/models/user.interface';
          import { AppEnvironment } from './environment.model';

          const appUsers: LoveUser[] = [
            {
              id: 'user_you',
              name: '${process.env.MYLOVE_USER_NAME}',
              avatar: '${process.env.MYLOVE_USER_AVATAR}',
              partnerId: 'user_partner'
            },
            {
              id: 'user_partner',
              name: '${process.env.MYLOVE_PARTNER_NAME}',
              avatar: '${process.env.MYLOVE_PARTNER_AVATAR}',
              partnerId: 'user_you'
            }
          ];

          export const environment: AppEnvironment = {
            production: true,
            sharedAccessCode: '${process.env.MYLOVE_SHARED_ACCESS_CODE}',
            firebase: {
              apiKey: '${process.env.FIREBASE_API_KEY}',
              authDomain: '${process.env.FIREBASE_AUTH_DOMAIN}',
              projectId: '${process.env.FIREBASE_PROJECT_ID}',
              storageBucket: '${process.env.FIREBASE_STORAGE_BUCKET}',
              messagingSenderId: '${process.env.FIREBASE_MESSAGING_SENDER_ID}',
              appId: '${process.env.FIREBASE_APP_ID}'
            },
            appUsers
          };
          `;

          writeFileSync('src/environments/environment.prod.ts', envFile);
          EOF

          node scripts-write-env.mjs
          rm scripts-write-env.mjs

      - name: Build app
        run: npm run build -- --base-href "/${{ github.event.repository.name }}/"

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/my-love/browser

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
